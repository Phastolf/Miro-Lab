<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miro_lab</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#d4af37">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Miro_lab%22,%22short_name%22:%22Miro_lab%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#d4af37%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3022/3022567.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        :root { --gold: #d4af37; --dark: #333; --bg: #fff; --soft: #f9f9f9; --save: #28a745; --info: #2196F3; }
        body { font-family: 'Georgia', serif; background-color: #f2f2f2; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--bg); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { font-family: sans-serif; letter-spacing: 2px; color: var(--dark); text-align: center; text-transform: uppercase; margin: 0; font-size: 1.5em; }
        .subtitle { text-align: center; font-size: 0.7em; letter-spacing: 3px; color: var(--gold); margin-bottom: 20px; font-weight: bold; }
        .card { padding: 15px; border-radius: 12px; background: var(--soft); border: 1px solid #eee; margin-bottom: 15px; }
        .multi-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 15px 0; }
        @media (min-width: 480px) { .multi-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .nota-col { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 8px; height: 180px; overflow-y: auto; }
        .nota-col h4 { margin: 0 0 8px 0; font-size: 0.7em; text-transform: uppercase; color: #888; border-bottom: 1px solid #eee; text-align: center; }
        .check-item { display: flex; align-items: center; font-size: 0.9em; margin-bottom: 8px; padding: 5px; border-radius: 5px; background: #fff; border: 1px solid #f0f0f0; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: var(--dark); color: white; border: none; font-weight: bold; cursor: pointer; }
        .desc-box { background: #fff9f0; border-left: 4px solid #e67e22; padding: 12px; margin: 12px 0; font-style: italic; font-size: 0.9em; }
        #panelAdmin, #panelGuardados, #panelCostos { display: none; margin-top: 20px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .sync-status { font-size: 0.7em; text-align: center; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Miro_lab</h1>
    <div class="subtitle">ATELIER PROFESIONAL</div>
    <div id="syncMsg" class="sync-status">Conectando con Google Drive...</div>
    
    <div id="mainUI">
        <div class="card">
            <div style="display: flex; gap: 8px;">
                <div style="flex: 1;"><label><small>ml</small></label><input type="number" id="volTotal" value="30"></div>
                <div style="flex: 1;"><label><small>Intensidad %</small></label><input type="number" id="tipoConc" value="18"></div>
                <div style="flex: 1;"><label><small>Costo Frasco</small></label><input type="number" id="costoFrascoBase" value="0"></div>
            </div>
            <div class="multi-grid">
                <div class="nota-col"><h4>🌸 Salida</h4><div id="listaCabeza"></div></div>
                <div class="nota-col"><h4>🌿 Corazón</h4><div id="listaCorazon"></div></div>
                <div class="nota-col"><h4>🪵 Fondo</h4><div id="listaFondo"></div></div>
            </div>
            <button onclick="generar()">CALCULAR MEZCLA</button>
            <div id="resultado" style="display:none;" class="card" style="background:white; border:2px solid var(--gold); margin-top:15px;">
                <div id="recetaTxt"></div>
                <div id="perfilOlfativo" class="desc-box"></div>
                <div id="costoDetalle" style="font-weight:bold; color:var(--info);"></div>
                <input type="text" id="nomFor" placeholder="Nombre de la fórmula...">
                <button onclick="guardarF()" style="background:var(--save); margin-top:10px;">💾 GUARDAR</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="toggleSec('panelGuardados')" style="background:#607D8B;">📖 LIBRO</button>
            <button onclick="toggleSec('panelAdmin')" style="background:#607D8B;">⚙️ ACEITES</button>
        </div>
    </div>

    <div id="panelAdmin">
        <button onclick="cerrarPaneles()" style="background:#ccc; color:#333;">✕ CERRAR</button>
        <h3>⚙️ Inventario</h3>
        <button onclick="importarDrive()" style="background:var(--gold); margin-bottom:15px;">🔄 RE-SINCRONIZAR DRIVE</button>
        <div style="overflow-x: auto;"><table id="tabAdm"><thead><tr><th>Aceite</th><th>Nota</th><th>Costo</th><th>Acción</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="panelGuardados">
        <button onclick="cerrarPaneles()" style="background:#ccc; color:#333;">✕ CERRAR</button>
        <h3>📖 Libro de Fórmulas</h3>
        <div id="listaF"></div>
    </div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJDdfkTCmRXM8zF6q-p-pUd2iWqnkuhDQ6QK4LcYXn6vbcm_HMCiCo05wWGWZPiw1UlfYToMJ6Vb_X/pub?output=csv";
    
    let db = JSON.parse(localStorage.getItem('mirolab_db')) || [];
    let recs = JSON.parse(localStorage.getItem('mirolab_recs')) || [];

    async function importarDrive() {
        document.getElementById("syncMsg").innerText = "Sincronizando con Drive...";
        try {
            const res = await fetch(SHEET_URL);
            const data = await res.text();
            const filas = data.split("\n").slice(1); // Ignorar cabecera
            
            let nuevosAceites = [];
            filas.forEach(fila => {
                const cols = fila.split(",");
                if(cols.length >= 4) {
                    nuevosAceites.push({
                        n: cols[0].trim(),
                        nota: cols[1].trim(),
                        f: cols[2].trim(),
                        p: parseFloat(cols[3]),
                        ml: parseFloat(cols[4]) || 10
                    });
                }
            });
            
            if(nuevosAceites.length > 0) {
                db = nuevosAceites;
                localStorage.setItem('mirolab_db', JSON.stringify(db));
                document.getElementById("syncMsg").innerText = "Sincronizado con éxito";
                poblar();
            }
        } catch (e) {
            document.getElementById("syncMsg").innerText = "Usando datos locales (Sin conexión)";
        }
    }

    function cerrarPaneles() {
        document.getElementById("panelAdmin").style.display = "none";
        document.getElementById("panelGuardados").style.display = "none";
        document.getElementById("mainUI").style.display = "block";
    }

    function toggleSec(id) {
        document.getElementById("mainUI").style.display = "none";
        document.getElementById(id).style.display = "block";
        if(id === 'panelAdmin') actualizarAdm();
        if(id === 'panelGuardados') actualizarRecs();
    }

    function poblar() {
        ["Cabeza", "Corazon", "Fondo"].forEach(tipo => {
            const div = document.getElementById("lista" + tipo);
            div.innerHTML = "";
            db.filter(e => e.nota.toLowerCase().includes(tipo.toLowerCase().substring(0,3))).forEach(e => {
                div.innerHTML += `<label class="check-item"><input type="checkbox" name="chk${tipo}" value="${e.n}"> ${e.n}</label>`;
            });
        });
    }

    function generar() {
        const v = parseFloat(document.getElementById("volTotal").value);
        const c = parseFloat(document.getElementById("tipoConc").value);
        const cFrasco = parseFloat(document.getElementById("costoFrascoBase").value) || 0;
        const selC = Array.from(document.querySelectorAll('input[name="chkCabeza"]:checked')).map(el => el.value);
        const selCo = Array.from(document.querySelectorAll('input[name="chkCorazon"]:checked')).map(el => el.value);
        const selF = Array.from(document.querySelectorAll('input[name="chkFondo"]:checked')).map(el => el.value);

        if(!selC.length || !selCo.length || !selF.length) return alert("Selecciona aceites en las 3 notas.");

        const gtsTotal = Math.round(v * (c/100) * 25);
        let costoE = 0;
        
        const calc = (lista, peso) => {
            const gts = (gtsTotal * peso) / lista.length;
            return lista.map(n => {
                const a = db.find(x => x.n === n);
                costoE += (gts/25) * (a.p / a.ml);
                return {n, g: Math.round(gts)};
            });
        };

        const rC = calc(selC, 0.2), rCo = calc(selCo, 0.35), rF = calc(selF, 0.45);
        const total = costoE + cFrasco + ((v * 0.8) * 1); // Estimación alcohol

        document.getElementById("recetaTxt").innerHTML = `<b>${v}ml (${gtsTotal} gotas)</b><br>🌸 ${rC.map(x=>x.g+'g '+x.n).join('+')}<br>🌿 ${rCo.map(x=>x.g+'g '+x.n).join('+')}<br>🪵 ${rF.map(x=>x.g+'g '+x.n).join('+')}`;
        document.getElementById("costoDetalle").innerText = `Costo Total: $${total.toFixed(2)}`;
        document.getElementById("resultado").style.display = "block";
        tempRec = {n:"", v, total, fecha: new Date().toLocaleDateString()};
    }

    function guardarF() {
        tempRec.n = document.getElementById("nomFor").value || "Perfume";
        recs.unshift(tempRec);
        localStorage.setItem('mirolab_recs', JSON.stringify(recs));
        alert("¡Guardado!");
    }

    function actualizarAdm() {
        const tb = document.querySelector("#tabAdm tbody");
        tb.innerHTML = "";
        db.forEach((e, i) => {
            tb.innerHTML += `<tr><td>${e.n}</td><td>${e.nota}</td><td>$${e.p}</td><td><button onclick="db.splice(${i},1);actualizarAdm()" style="background:red;padding:5px;">✕</button></td></tr>`;
        });
    }

    function actualizarRecs() {
        const div = document.getElementById("listaF");
        div.innerHTML = recs.map(r => `<div class="card"><b>${r.n}</b> - $${r.total.toFixed(2)}<br><small>${r.fecha}</small></div>`).join("");
    }

    // Al cargar, importar de Drive
    window.onload = () => { importarDrive(); poblar(); };

    // Service Worker para instalación
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
