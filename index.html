<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miro_lab | v6.6 Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        #lockscreen { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 300px; text-align: center; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid #e0e0e0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .oil-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .note-column { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; height: 300px; overflow-y: auto; }
        .note-column h4 { margin: 0 0 10px 0; color: var(--gold); text-align: center; border-bottom: 1px solid #eee; text-transform: uppercase; font-size: 0.8rem; }
        .oil-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; cursor: pointer; }
        .oil-item input { margin-right: 10px; width: 18px; height: 18px; }
        label { font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; display: block; margin-top: 10px; }
        select, input, textarea, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { background: var(--dark); color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-gold { background: var(--gold); }
        .result-box { background: #fffdf0; border: 2px solid var(--gold); padding: 20px; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
        th { background: #eee; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .action-btns { display: flex; gap: 5px; }
        .btn-sm-edit { background: #28a745; width: 35px; height: 30px; display: flex; align-items: center; justify-content: center; margin: 0; }
        .btn-sm-del { background: #dc3545; width: 35px; height: 30px; display: flex; align-items: center; justify-content: center; margin: 0; }
    </style>
</head>
<body>

<div id="lockscreen">
    <div class="login-box">
        <h2>MIRO_LAB</h2>
        <input type="password" id="passInput" placeholder="CONTRASEÑA" onkeydown="if(event.key==='Enter') checkAccess()">
        <button onclick="checkAccess()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="labApp" style="display:none;">
    <div class="container">
        <header><h1>MIRO_LAB</h1><small>LABORATORIO PROFESIONAL</small></header>

        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <div><label>Frasco (ml)</label><input type="number" id="volTotal" value="30"></div>
                <div><label>Concentración %</label>
                    <select id="intensity">
                        <option value="18">EdP (18%)</option>
                        <option value="12">EdT (12%)</option>
                        <option value="25">Extracto (25%)</option>
                    </select>
                </div>
                <div><label>Alc. $/Litro</label><input type="number" id="priceAlcohol" value="1500"></div>
            </div>

            <div class="oil-grid">
                <div class="note-column"><h4>Salida</h4><div id="listTop"></div></div>
                <div class="note-column"><h4>Corazón</h4><div id="listHeart"></div></div>
                <div class="note-column"><h4>Fondo</h4><div id="listBase"></div></div>
            </div>
            <button onclick="calculate()" class="btn-gold">Generar Fórmula</button>
        </div>

        <div id="resultBox" class="result-box" style="display:none;">
            <div id="formulaOutput"></div>
            <label>Descripción / Notas</label>
            <textarea id="formDesc" rows="3"></textarea>
            <input type="text" id="formName" placeholder="Nombre de la fragancia" style="margin-top:10px;">
            <button onclick="saveToCloud()" style="background:#28a745;">💾 Guardar</button>
        </div>

        <div style="display:flex; gap:10px; margin: 20px 0;">
            <button onclick="showPanel('panelLibrary')" style="background:#ddd; color:#333;">📖 Libro</button>
            <button onclick="showPanel('panelInventory')" style="background:#ddd; color:#333;">⚙️ Inventario</button>
        </div>

        <div id="panelLibrary" class="card" style="display:none;"><div id="libraryCont"></div></div>

        <div id="panelInventory" class="card" style="display:none;">
            <h3 id="invTitle">Gestión de Aceites</h3>
            <div style="background: #f0f0f0; padding: 15px; border-radius: 8px;">
                <input type="hidden" id="editId">
                <label>Nombre</label><input type="text" id="newOilName">
                <label>Nota</label>
                <select id="newOilNote">
                    <option value="Top">Salida</option>
                    <option value="Heart">Corazón</option>
                    <option value="Base">Fondo</option>
                </select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="flex:1;"><label>Precio ($)</label><input type="number" id="newOilPrice"></div>
                    <div style="flex:1;"><label>ML</label><input type="number" id="newOilML"></div>
                </div>
                <button onclick="addOil()" id="btnAdd" class="btn-gold">Guardar Aceite</button>
                <button onclick="cancelEdit()" id="btnCancel" style="background:#666; display:none;">Cancelar</button>
            </div>
            <table>
                <thead><tr><th>Nombre</th><th>$ / ML</th><th>Acciones</th></tr></thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDp2Pb74Gyhmd5SCN8FjN_jgIdozz89R8s",
      authDomain: "miro-lab-42dfa.firebaseapp.com",
      databaseURL: "https://miro-lab-42dfa-default-rtdb.firebaseio.com",
      projectId: "miro-lab-42dfa",
      appId: "1:1093426796808:web:bb325f92d1a63e989e74bd"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkAccess() {
        if(document.getElementById('passInput').value.toLowerCase() === 'miro2026') {
            document.getElementById('lockscreen').style.display = 'none';
            document.getElementById('labApp').style.display = 'block';
            syncData();
        }
    }

    let oils = [];
    function syncData() {
        database.ref('oils').on('value', (snapshot) => {
            const data = snapshot.val();
            oils = data ? Object.values(data).sort((a, b) => a.name.localeCompare(b.name)) : [];
            updateOilUI();
        });
        database.ref('formulas').on('value', (snapshot) => {
            const data = snapshot.val();
            const formulas = data ? Object.values(data).reverse() : [];
            const container = document.getElementById('libraryCont');
            container.innerHTML = "<h3>Historial</h3>";
            formulas.forEach(f => {
                container.innerHTML += `<div style="border-bottom:1px solid #eee; padding:15px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${f.name}</b>
                        <button onclick="deleteFormula('${f.id}')" style="width:auto; padding:2px 8px; background:red;">✕</button>
                    </div>
                    <p style="font-size:12px; margin:5px 0;">${f.desc || ''}</p>
                    <small>${f.date} | $${f.costoTotal}</small>
                </div>`;
            });
        });
    }

    function updateOilUI() {
        const categories = { Top: 'listTop', Heart: 'listHeart', Base: 'listBase' };
        Object.keys(categories).forEach(cat => {
            const div = document.getElementById(categories[cat]);
            div.innerHTML = "";
            oils.filter(o => o.note === cat).forEach(o => {
                div.innerHTML += `<label class="oil-item"><input type="checkbox" name="oilSelect" value="${o.id}"><span>${o.name}</span></label>`;
            });
        });
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = "";
        oils.forEach(o => {
            tbody.innerHTML += `<tr>
                <td>${o.name} <br><small style="color:#999">${o.note}</small></td>
                <td>$${o.price} / ${o.ml}ml</td>
                <td>
                    <div class="action-btns">
                        <button onclick="editOil('${o.id}')" class="btn-sm-edit">✎</button>
                        <button onclick="deleteOil('${o.id}')" class="btn-sm-del">✕</button>
                    </div>
                </td>
            </tr>`;
        });
    }

    function addOil() {
        const id = document.getElementById('editId').value || Date.now().toString();
        const name = document.getElementById('newOilName').value.trim();
        const note = document.getElementById('newOilNote').value;
        const price = document.getElementById('newOilPrice').value || 0;
        const ml = document.getElementById('newOilML').value || 10;
        if(!name) return;
        database.ref('oils/' + id).set({ id, name, note, price, ml }).then(() => cancelEdit());
    }

    function editOil(id) {
        const o = oils.find(item => item.id === id);
        document.getElementById('editId').value = o.id;
        document.getElementById('newOilName').value = o.name;
        document.getElementById('newOilNote').value = o.note;
        document.getElementById('newOilPrice').value = o.price;
        document.getElementById('newOilML').value = o.ml;
        document.getElementById('btnCancel').style.display = "block";
        document.getElementById('invTitle').innerText = "Editando Aceite";
        window.scrollTo(0, 0);
    }

    function cancelEdit() {
        document.getElementById('editId').value = "";
        document.getElementById('newOilName').value = "";
        document.getElementById('newOilPrice').value = "";
        document.getElementById('newOilML').value = "";
        document.getElementById('invTitle').innerText = "Gestión de Aceites";
        document.getElementById('btnCancel').style.display = "none";
    }

    function deleteOil(id) { if(confirm("¿Eliminar este aceite del inventario?")) database.ref('oils/' + id).remove(); }
    function deleteFormula(id) { if(confirm("¿Eliminar fórmula?")) database.ref('formulas/' + id).remove(); }

    function calculate() {
        const vol = parseFloat(document.getElementById('volTotal').value);
        const conc = parseFloat(document.getElementById('intensity').value);
        const pAlcohol = parseFloat(document.getElementById('priceAlcohol').value);
        const selected = Array.from(document.querySelectorAll('input[name="oilSelect"]:checked'));

        if(selected.length < 1) return alert("Selecciona aceites");

        const mlEsencia = vol * (conc / 100);
        const mlAlcohol = vol - mlEsencia;
        const totalDrops = Math.round(mlEsencia * 25);
        const dropsPerOil = (totalDrops / selected.length).toFixed(1);
        
        const costoAlcohol = (pAlcohol / 1000) * mlAlcohol;
        let costoAceites = 0;
        let desglose = "";

        selected.forEach(el => {
            const o = oils.find(item => item.id === el.value);
            const costoPorGota = (parseFloat(o.price)||0) / ((parseFloat(o.ml)||1) * 25);
            costoAceites += costoPorGota * parseFloat(dropsPerOil);
            desglose += `<li><b>${o.name}:</b> ${dropsPerOil} gotas</li>`;
        });

        const costoTotal = costoAceites + costoAlcohol;

        document.getElementById('formulaOutput').innerHTML = `
            <h3>Costo Total: $${costoTotal.toFixed(2)}</h3>
            <p>Alcohol: ${mlAlcohol.toFixed(1)} ml | Esencia: ${mlEsencia.toFixed(1)} ml</p>
            <hr>
            <ul style="padding-left:20px; font-size:14px;">${desglose}</ul>
        `;
        document.getElementById('resultBox').style.display = 'block';
        window.currentFormula = { vol, totalDrops, mlAlcohol: mlAlcohol.toFixed(1), costoTotal: costoTotal.toFixed(2), date: new Date().toLocaleDateString() };
    }

    function saveToCloud() {
        const name = document.getElementById('formName').value || "Sin nombre";
        const desc = document.getElementById('formDesc').value;
        const id = Date.now().toString();
        database.ref('formulas/' + id).set({ ...window.currentFormula, name, desc, id });
        alert("Fórmula guardada.");
        document.getElementById('resultBox').style.display = 'none';
    }

    function showPanel(id) {
        document.getElementById('panelLibrary').style.display = 'none';
        document.getElementById('panelInventory').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
