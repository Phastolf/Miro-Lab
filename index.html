<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro_lab | Atelier</title>
    <style>
        :root { --oro: #c5a059; --oscuro: #1a1a1a; --gris: #f8f9fa; --borde: #e0e0e0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f0f0; margin: 0; color: #333; }
        .wrapper { max-width: 600px; margin: auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--oscuro); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--oro); }
        header h1 { margin: 0; letter-spacing: 5px; font-weight: 300; text-transform: uppercase; font-size: 1.8em; }
        header p { margin: 5px 0 0; font-size: 0.7em; letter-spacing: 3px; color: var(--oro); }

        .content { padding: 20px; flex-grow: 1; }
        .seccion { margin-bottom: 25px; }
        .titulo-seccion { font-size: 0.75em; font-weight: bold; color: var(--oro); text-transform: uppercase; border-bottom: 1px solid var(--borde); padding-bottom: 5px; margin-bottom: 15px; letter-spacing: 1px; }

        /* Inputs */
        .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .campo label { display: block; font-size: 0.7em; margin-bottom: 5px; color: #666; }
        input[type="number"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 4px; box-sizing: border-box; font-size: 16px; }

        /* Lista de Esencias */
        .lista-vertical { display: flex; flex-direction: column; gap: 8px; }
        .check-card { display: flex; align-items: center; padding: 12px; background: var(--gris); border-radius: 6px; border: 1px solid var(--borde); cursor: pointer; transition: 0.2s; }
        .check-card:active { background: #eee; }
        .check-card input { margin-right: 15px; transform: scale(1.3); }
        .check-card span { font-size: 0.9em; flex-grow: 1; }

        /* Botones */
        .btn-principal { background: var(--oscuro); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; letter-spacing: 1px; cursor: pointer; margin-top: 10px; }
        .btn-principal:hover { background: #333; }
        .btn-secundario { background: white; border: 1px solid var(--oscuro); color: var(--oscuro); padding: 10px; border-radius: 4px; font-size: 0.8em; cursor: pointer; flex: 1; }

        /* Resultado */
        #resultado { display: none; margin-top: 20px; padding: 20px; background: var(--gris); border-radius: 8px; border-left: 5px solid var(--oro); font-size: 0.9em; line-height: 1.6; }

        /* Tabla Admin */
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th { text-align: left; padding: 10px; background: #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        #panelAdmin { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Miro_lab</h1>
        <p>ATELIER DE PERFUMERÍA</p>
    </header>

    <div class="content" id="mainUI">
        <div class="config-row">
            <div class="campo">
                <label>TAMAÑO FRASCO (ml)</label>
                <input type="number" id="v_ml" value="30">
            </div>
            <div class="campo">
                <label>CONCENTRACIÓN (%)</label>
                <input type="number" id="v_c" value="18">
            </div>
        </div>

        <div class="seccion">
            <div class="titulo-seccion">🌸 Notas de Salida</div>
            <div id="lista-salida" class="lista-vertical"></div>
        </div>

        <div class="seccion">
            <div class="titulo-seccion">🌿 Notas de Corazón</div>
            <div id="lista-corazon" class="lista-vertical"></div>
        </div>

        <div class="seccion">
            <div class="titulo-seccion">🪵 Notas de Fondo</div>
            <div id="lista-fondo" class="lista-vertical"></div>
        </div>

        <button class="btn-principal" onclick="calcular()">CALCULAR PERFIL OLFATIVO</button>

        <div id="resultado"></div>

        <div style="display: flex; gap: 10px; margin-top: 30px;">
            <button class="btn-secundario" onclick="toggleView('admin')">GESTIONAR ACEITES</button>
        </div>
    </div>

    <div class="content" id="panelAdmin">
        <button class="btn-secundario" onclick="toggleView('main')" style="margin-bottom: 20px;">← VOLVER</button>
        <div class="titulo-seccion">Importar desde Excel (TSV)</div>
        <button class="btn-principal" style="background: var(--oro); color: white; margin-bottom: 20px;" onclick="sincronizar()">SINCRONIZAR CON DRIVE</button>
        
        <div class="titulo-seccion">Inventario Local</div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Nota</th><th>Costo</th><th>Acción</th></tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJDdfkTCmRXM8zF6q-p-pUd2iWqnkuhDQ6QK4LcYXn6vbcm_HMCiCo05wWGWZPiw1UlfYToMJ6Vb_X/pub?output=tsv";
    
    let db = JSON.parse(localStorage.getItem('m_db')) || [];

    async function sincronizar() {
        try {
            const r = await fetch(TSV_URL + "&nocache=" + Date.now());
            const txt = await r.text();
            const filas = txt.split("\n");
            let nuevos = [];

            filas.forEach((f, i) => {
                if(i === 0 || f.trim() === "") return;
                const c = f.split("\t");
                if(c.length >= 3) {
                    let precio = parseFloat(c[2]?.replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                    let ml = parseFloat(c[3]?.replace(/[^\d.,]/g, '').replace(',', '.')) || 10;
                    nuevos.push({ n: c[0].trim(), nota: c[1]?.trim() || "Fondo", p: precio, m: ml });
                }
            });

            db = nuevos;
            localStorage.setItem('m_db', JSON.stringify(db));
            render();
            alert("✓ " + db.length + " aceites sincronizados correctamente.");
        } catch(e) { alert("Error al conectar con Drive. Revisa la conexión."); }
    }

    function render() {
        const boxes = {
            "salida": document.getElementById('lista-salida'),
            "corazon": document.getElementById('lista-corazon'),
            "fondo": document.getElementById('lista-fondo')
        };
        
        Object.values(boxes).forEach(b => b.innerHTML = "");
        
        db.forEach(aceite => {
            const n = aceite.nota.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            let target = "fondo";
            if(n.includes("salida") || n.includes("cabeza")) target = "salida";
            else if(n.includes("corazon") || n.includes("medio")) target = "corazon";
            
            boxes[target].innerHTML += `
                <label class="check-card">
                    <input type="checkbox" value="${aceite.n}" data-nota="${target}"> 
                    <span>${aceite.n}</span>
                </label>`;
        });

        document.getElementById("tabla-cuerpo").innerHTML = db.map((a, i) => `
            <tr>
                <td>${a.n}</td>
                <td><small>${a.nota}</small></td>
                <td>$${a.p}</td>
                <td><button onclick="borrar(${i})" style="color:red; background:none; border:none; cursor:pointer;">✕</button></td>
            </tr>`).join("");
    }

    function borrar(i) {
        db.splice(i, 1);
        localStorage.setItem('m_db', JSON.stringify(db));
        render();
    }

    function toggleView(view) {
        document.getElementById('mainUI').style.display = view === 'main' ? 'block' : 'none';
        document.getElementById('panelAdmin').style.display = view === 'admin' ? 'block' : 'none';
    }

    function calcular() {
        const vol = parseFloat(document.getElementById('v_ml').value);
        const conc = parseFloat(document.getElementById('v_c').value);
        const sels = Array.from(document.querySelectorAll('input:checked'));
        
        if(sels.length === 0) return alert("Por favor, selecciona alguna esencia.");
        
        const gtsT = Math.round(vol * (conc/100) * 25);
        let costoTotal = 0;
        let html = `<strong>FÓRMULA PARA ${vol}ml</strong><br><small>${gtsT} gotas en total</small><br><hr style="border:0; border-top:1px solid #ddd; margin:10px 0;">`;

        ["salida", "corazon", "fondo"].forEach(t => {
            const items = sels.filter(s => s.dataset.nota === t);
            if(items.length > 0) {
                const peso = t === "salida" ? 0.2 : t === "corazon" ? 0.35 : 0.45;
                const gtsXAceite = Math.round((gtsT * peso) / items.length);
                html += `<strong style="font-size:0.8em; color:var(--oro);">${t.toUpperCase()}</strong><br>`;
                items.forEach(it => {
                    const a = db.find(x => x.n === it.value);
                    costoTotal += (gtsXAceite/25) * (a.p / a.m);
                    html += `• ${gtsXAceite} gotas de ${it.value}<br>`;
                });
                html += `<br>`;
            }
        });

        document.getElementById('resultado').innerHTML = html + `<hr style="border:0; border-top:1px solid #ddd; margin:10px 0;"><span style="color:#2e7d32; font-weight:bold; font-size:1.1em;">Costo de esencias: $${costoTotal.toFixed(2)}</span>`;
        document.getElementById('resultado').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = render;
</script>
</body>
</html>
