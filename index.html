<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miro_lab</title>
    <style>
        :root { --gold: #d4af37; --dark: #333; --bg: #fff; --soft: #f4f4f4; --accent: #e5e5e5; }
        body { font-family: 'Georgia', serif; background: #f0f0f0; padding: 10px; margin: 0; color: var(--dark); }
        .container { max-width: 500px; margin: auto; background: var(--bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; letter-spacing: 3px; margin: 0; font-size: 1.6em; text-transform: uppercase; }
        .subtitle { text-align: center; font-size: 0.7em; letter-spacing: 4px; color: var(--gold); font-weight: bold; margin-bottom: 15px; }
        
        /* Estética de Card y Formularios */
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); margin-bottom: 15px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { font-size: 0.7em; text-transform: uppercase; color: #777; font-weight: bold; display: block; margin-bottom: 4px; }
        input[type="number"], button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        /* Selectores Encolumnados (Verticales) */
        .nota-section { margin-bottom: 15px; }
        .nota-header { background: var(--dark); color: white; padding: 6px 12px; border-radius: 5px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .nota-lista { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; padding-left: 5px; }
        .item-check { display: flex; align-items: center; padding: 8px; background: var(--soft); border-radius: 6px; font-size: 0.9em; cursor: pointer; transition: 0.2s; }
        .item-check:active { background: var(--accent); }
        .item-check input { margin-right: 12px; transform: scale(1.2); }

        /* Botones y Resultados */
        button { background: var(--dark); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .btn-sync { background: var(--gold); color: white; margin-bottom: 15px; }
        #res { display: none; margin-top: 15px; padding: 15px; background: #fffdf0; border-left: 4px solid var(--gold); font-size: 0.95em; line-height: 1.5; }

        /* Paneles Secundarios */
        #panelAdmin, #panelLibro { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; }
        th { background: #eee; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .status-msg { font-size: 0.6em; text-align: center; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Miro_lab</h1>
    <div class="subtitle">ATELIER</div>
    <div id="status" class="status-msg">Cargando...</div>

    <div id="mainUI">
        <div class="card">
            <div class="input-row">
                <div class="input-group"><label>Frasco (ml)</label><input type="number" id="v_ml" value="30"></div>
                <div class="input-group"><label>Conc %</label><input type="number" id="v_c" value="18"></div>
            </div>

            <div class="nota-section">
                <div class="nota-header">🌸 Notas de Salida</div>
                <div id="box-salida" class="nota-lista"></div>
            </div>

            <div class="nota-section">
                <div class="nota-header">🌿 Notas de Corazón</div>
                <div id="box-corazon" class="nota-lista"></div>
            </div>

            <div class="nota-section">
                <div class="nota-header">🪵 Notas de Fondo</div>
                <div id="box-fondo" class="nota-lista"></div>
            </div>

            <button onclick="calcular()" style="background: var(--gold);">CALCULAR FÓRMULA</button>
            <div id="res"></div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button onclick="irA('panelAdmin')" style="background:#555">INVENTARIO</button>
            <button onclick="irA('panelLibro')" style="background:#555">RECETAS</button>
        </div>
    </div>

    <div id="panelAdmin">
        <button onclick="irA('mainUI')" style="background:#ccc; color:black; margin-bottom:10px;">✕ VOLVER</button>
        <button class="btn-sync" onclick="sincronizar()">🔄 ACTUALIZAR DESDE DRIVE</button>
        <div class="card" style="padding:5px; overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Nota</th><th>$</th><th>ml</th><th></th></tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>

    <div id="panelLibro">
        <button onclick="irA('mainUI')" style="background:#ccc; color:black">✕ VOLVER</button>
        <h3>Recetas Guardadas</h3>
        <div id="lista-recetas"></div>
    </div>
</div>

<script>
    const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJDdfkTCmRXM8zF6q-p-pUd2iWqnkuhDQ6QK4LcYXn6vbcm_HMCiCo05wWGWZPiw1UlfYToMJ6Vb_X/pub?output=tsv";
    
    let db = JSON.parse(localStorage.getItem('m_db')) || [];

    async function sincronizar() {
        document.getElementById('status').innerText = "Sincronizando con Google Drive...";
        try {
            const r = await fetch(TSV_URL + "&nocache=" + Date.now());
            const txt = await r.text();
            const filas = txt.split("\n");
            let nuevos = [];

            filas.forEach((f, i) => {
                if(i === 0 || f.trim() === "") return; 
                const c = f.split("\t");
                if(c.length >= 3) {
                    // Mapeo ESENCIA (0) - NOTA (1) - PRECIO (2) - ML (3)
                    let precio = parseFloat(c[2]?.replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
                    let ml = parseFloat(c[3]?.replace(/[^\d.,]/g, '').replace(',', '.')) || 10;
                    
                    nuevos.push({
                        n: c[0].trim(),
                        nota: c[1] ? c[1].trim() : "Fondo",
                        p: precio,
                        m: ml
                    });
                }
            });

            db = nuevos;
            localStorage.setItem('m_db', JSON.stringify(db));
            render();
            document.getElementById('status').innerText = "✓ " + db.length + " aceites sincronizados";
            alert("Sincronización completa");
        } catch(e) {
            document.getElementById('status').innerText = "Error de red";
        }
    }

    function render() {
        const boxes = {
            "salida": document.getElementById('box-salida'),
            "corazon": document.getElementById('box-corazon'),
            "fondo": document.getElementById('box-fondo')
        };
        
        Object.values(boxes).forEach(b => b.innerHTML = "");
        
        db.forEach(aceite => {
            const n = aceite.nota.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            let target = "fondo";
            if(n.includes("salida") || n.includes("cabeza")) target = "salida";
            else if(n.includes("corazon") || n.includes("medio")) target = "corazon";
            
            if(boxes[target]) {
                boxes[target].innerHTML += `
                    <label class="item-check">
                        <input type="checkbox" value="${aceite.n}" data-nota="${target}"> 
                        ${aceite.n}
                    </label>`;
            }
        });

        // Inventario con todas las columnas
        const tbody = document.getElementById("tabla-cuerpo");
        tbody.innerHTML = db.map((a, i) => `
            <tr>
                <td><b>${a.n}</b></td>
                <td><small>${a.nota}</small></td>
                <td>$${a.p}</td>
                <td>${a.m}</td>
                <td><button onclick="borrar(${i})" style="padding:4px 8px; background:red; width:auto; font-size:10px;">✕</button></td>
            </tr>
        `).join("");
    }

    function borrar(i) {
        if(confirm("¿Borrar este aceite?")) {
            db.splice(i, 1);
            localStorage.setItem('m_db', JSON.stringify(db));
            render();
        }
    }

    function irA(id) {
        document.getElementById('mainUI').style.display = id === 'mainUI' ? 'block' : 'none';
        document.getElementById('panelAdmin').style.display = id === 'panelAdmin' ? 'block' : 'none';
        document.getElementById('panelLibro').style.display = id === 'panelLibro' ? 'block' : 'none';
    }

    function calcular() {
        const vol = parseFloat(document.getElementById('v_ml').value);
        const conc = parseFloat(document.getElementById('v_c').value);
        const sels = Array.from(document.querySelectorAll('input:checked'));
        
        if(sels.length === 0) return alert("Selecciona al menos un aceite");
        
        const gtsT = Math.round(vol * (conc/100) * 25);
        let costoTotal = 0;
        let html = `<strong>Mezcla para ${vol}ml (${gtsT} gotas):</strong><br><hr>`;

        ["salida", "corazon", "fondo"].forEach(t => {
            const items = sels.filter(s => s.dataset.nota === t);
            if(items.length > 0) {
                const peso = t === "salida" ? 0.2 : t === "corazon" ? 0.35 : 0.45;
                const gtsXAceite = Math.round((gtsT * peso) / items.length);
                html += `<br><small>${t.toUpperCase()}</small><br>`;
                items.forEach(it => {
                    const a = db.find(x => x.n === it.value);
                    costoTotal += (gtsXAceite/25) * (a.p / a.m);
                    html += `• ${gtsXAceite} gotas de <b>${it.value}</b><br>`;
                });
            }
        });

        document.getElementById('res').innerHTML = html + `<hr><span style="color:green; font-weight:bold;">Costo estimado: $${costoTotal.toFixed(2)}</span>`;
        document.getElementById('res').style.display = "block";
    }

    window.onload = render;
</script>
</body>
</html>
